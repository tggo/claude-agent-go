version: 2

project_name: cag

before:
  hooks:
    - go mod tidy

builds:
  - id: cag
    main: ./cmd/cag
    binary: cag
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: cag
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  footer: |
    Install the CLI:
    ```sh
    go install github.com/tggo/claude-agent-go/cmd/cag@latest
    ```
    Or download a binary from the assets below.
